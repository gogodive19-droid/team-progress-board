<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>진척 대시보드</title><style>
:root{--bg:#f6f5f1;--card:#fff;--ink:#1a1a17;--mut:#6b6a64;--line:#e6e4dc;--accent:#2f7d5b}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Malgun Gothic",sans-serif;line-height:1.5}
.gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:10}
.gatebox{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:32px;width:min(92vw,380px);text-align:center;box-shadow:0 2px 20px rgba(0,0,0,.05)}
.gatebox h2{margin:0 0 6px;font-size:18px}
.gatebox p{margin:0 0 18px;color:var(--mut);font-size:13px}
.gatebox input{width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:9px;font-size:15px;margin-bottom:10px}
.gatebox button{width:100%;padding:11px;border:0;border-radius:9px;background:var(--accent);color:#fff;font-size:15px;cursor:pointer}
.gatebox .err{color:#c0392b;font-size:13px;min-height:18px;margin-top:8px}
.wrap{max-width:980px;margin:0 auto;padding:28px 20px 60px}
header h1{font-size:22px;margin:0 0 4px}
.sub{color:var(--mut);font-size:13px;margin-bottom:20px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
@media(max-width:640px){.cards{grid-template-columns:repeat(2,1fr)}}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.cl{font-size:12px;color:var(--mut);margin-bottom:6px}
.cv{font-size:24px;font-weight:600}
.bar{height:10px;background:#e9e7e0;border-radius:6px;overflow:hidden;flex:1}
.fill{height:100%;border-radius:6px}
.legend{display:flex;gap:16px;margin:14px 0 8px;font-size:12px;color:var(--mut)}
.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
.brand{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-top:16px}
.bhead{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.btitle{font-size:16px;font-weight:600}
.bcode{font-size:12px;color:var(--mut);font-weight:400;margin-left:6px}
.bmeta{font-size:12px;color:var(--mut)}
table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
th{text-align:left;color:var(--mut);font-weight:500;font-size:12px;padding:6px 8px;border-bottom:1px solid var(--line)}
td{padding:7px 8px;border-bottom:1px solid #f0eee8}
.nm{max-width:280px}
.fc{text-align:right;font-variant-numeric:tabular-nums;color:var(--mut);white-space:nowrap}
.pb{display:flex;align-items:center;gap:8px;min-width:150px}
.pct{font-size:12px;color:var(--mut);width:34px;text-align:right;font-variant-numeric:tabular-nums}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap}
footer{margin-top:24px;color:var(--mut);font-size:12px;text-align:center}
</style></head>

ITER=250000;
const b64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(){
  const pw=document.getElementById('pw').value;
  const err=document.getElementById('err');err.textContent='';
  try{
    const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(DATA));
    document.getElementById('app').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('gate').style.display='none';
    sessionStorage.setItem('pw',pw);
  }catch(e){err.textContent='비밀번호가 틀렸습니다';}
}
window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('btn').addEventListener('click',unlock);
  document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
  const saved=sessionStorage.getItem('pw');
  if(saved){document.getElementById('pw').value=saved;unlock();}
  document.getElementById('pw').focus();
});
</script></body></html>
